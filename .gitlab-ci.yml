# Build the macOS app bundle (JourneyForgeLocal-mac.zip) on a Linux runner.
# Node-only: no apt, no corepack, no zip/rsync — works on a minimal node:20
# image and on shell runners alike. pnpm via npx (no global install / no root).
# The .app is a pure-file wrapper, so it assembles anywhere — no macOS runner.

stages: [build]

build-app:
  stage: build
  image: node:20-bookworm-slim
  variables:
    # Recreate the working dir each run. An earlier in-place build left a
    # pathologically nested out/JourneyForgeLocal.app/.../out/... in the runner's
    # persistent build dir; git clean (fetch strategy) can't remove that long
    # path and the job died before the script. clone wipes it via rm -rf.
    GIT_STRATEGY: clone
    npm_config_cache: "$CI_PROJECT_DIR/.npm"
    PNPM_STORE: "$CI_PROJECT_DIR/.pnpm-store"
  cache:
    key: pnpm-${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/
      - .pnpm-store/
      - extension/node_modules/
  script:
    - node -v
    - cd extension
    - npx --yes pnpm@9 config set store-dir "$PNPM_STORE"
    - npx --yes pnpm@9 install --no-frozen-lockfile
    - npx --yes pnpm@9 run build
    - cd ..
    - echo "Assembling macOS .app bundle…"
    - bash packaging/build-mac-app.sh "$CI_PROJECT_DIR/out"
    - ls -lh out/JourneyForgeLocal-mac.zip
    - 'echo "Download: $CI_PROJECT_URL/-/jobs/$CI_JOB_ID/artifacts/file/out/JourneyForgeLocal-mac.zip"'
  artifacts:
    name: "JourneyForgeLocal-mac-$CI_COMMIT_SHORT_SHA"
    paths:
      - out/JourneyForgeLocal-mac.zip
    expire_in: 12 weeks
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
